# CI workflow (référence statique)

Le fichier **réel** copié dans les projets est **généré** par `scripts/lib/ci-workflow.mjs` au bootstrap / upgrade.

Profils :

| `ciProfile` | Usage |
|-------------|--------|
| `node-scripts` | Scripts npm sans dépendances (défaut) — pas de `npm ci` |
| `node-vite` | Projet avec `dependencies` / `devDependencies` — `npm ci` + cache |
| `node-python` | PWA Python + infra Node — `validate:stack` + `unittest` |

Auto-détection si `ciProfile` absent : deps npm → `node-vite`, marqueurs Python → `node-python`, sinon `node-scripts`.

Régénérer dans un projet existant :

```bash
node REFERENCE/scripts/upgrade-project-from-reference.mjs "{projet}" --vars project.bootstrap.vars.json --force-ci
```
